<!doctype html>
<html>

<head>
    <meta charset='utf-8'>
    <title>Explorer</title>
    <link rel='stylesheet' href='css/style.css'>
</head>

<body>
    <header>
        <h1>AXIS Body Worn Content Destination Explorer</h1>
    </header>
    <main>
        <section class='card'>


            <h2>Authentication</h2>

            <label>Server</label>
            <input id="server" value="http://10.176.10.111:8080">

            <label>Username</label>
            <input id="username" value="vivek">

            <label>Password</label>
            <input id="password" type="password" placeholder="Password">

            <button id="loginBtn">
                Connect
            </button>

            <div id="status" class="status">
                Not connected
            </div>


        </section>

        <section class="card">

            <h2>Upload Video</h2>

            <div id="dropzone">

                <input id="file" type="file" accept="video/*" hidden>

                <button id="browseBtn">
                    Choose Video
                </button>

                <p id="filename">
                    No file selected
                </p>

            </div>

            <progress id="progress" max="100" value="0">
            </progress>

            <button id="uploadBtn">
                Upload
            </button>

        </section>

        <section class="card">

            <h2>HTTP Activity</h2>

            <pre id="log"></pre>

        </section>
    </main>
    <script src="js/api.js"></script>
    <script src="js/webgpu-render.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/upload.js"></script>
    <script src="js/app.js"></script>

</body>

</html>
